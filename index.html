<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>String Art Pro v9</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg: #f1f5f9; --card: #ffffff; --text: #1e293b;
            --circle: #ffffff; --line-hist: rgba(0,0,0,0.12); --label: #94a3b8;
        }
        .dark-mode {
            --bg: #0f172a; --card: #1e293b; --text: #f1f5f9;
            --circle: #334155; --line-hist: rgba(255,255,255,0.15); --label: #64748b;
        }
        body { background: var(--bg); color: var(--text); transition: 0.3s; font-family: sans-serif; }
        .app-card { background: var(--card); transition: background 0.3s; }
        .circle-bg { fill: var(--circle); stroke: var(--label); stroke-width: 1; }
        .h-line { stroke: var(--line-hist); stroke-width: 0.5; fill: none; }
        .c-line { stroke: #ef4444; stroke-width: 2.5; stroke-linecap: round; fill: none; }
        .peg-dot { fill: var(--label); }
        .peg-active { fill: #ef4444; filter: drop-shadow(0 0 4px rgba(239, 68, 68, 0.8)); }
        .p-lbl { font-family: ui-monospace, monospace; fill: var(--label); font-weight: bold; pointer-events: none; }
        .p-lbl.active { fill: #ef4444; font-size: 13px !important; transition: 0.2s; }
    </style>
</head>
<body class="min-h-screen p-2 md:p-8 flex flex-col items-center">

    <div class="max-w-2xl w-full app-card rounded-3xl shadow-2xl overflow-hidden border border-slate-500/10">
        <div class="bg-slate-800 p-5 text-white flex justify-between items-center">
            <div>
                <h1 class="font-bold text-xl">String Art Helper v9</h1>
                <p class="text-[10px] text-slate-400 uppercase tracking-widest">Legible Numbering</p>
            </div>
            <div class="flex gap-2">
                <button onclick="toggleDark()" class="p-2 bg-slate-700 hover:bg-slate-600 rounded-full transition">🌓</button>
                <button onclick="resetAll()" class="text-xs bg-red-900/40 hover:bg-red-900 px-3 py-1 rounded-lg border border-red-500/20 transition">Reset</button>
            </div>
        </div>

        <div class="p-4 md:p-8">
            <div id="setup" class="space-y-6">
                <textarea id="seqIn" class="w-full h-40 p-4 border rounded-2xl bg-slate-500/5 focus:ring-2 focus:ring-blue-500 outline-none font-mono text-sm" placeholder="Paste numbers..."></textarea>
                <div class="flex gap-4 items-end">
                    <div class="flex-1">
                        <label class="text-xs font-bold opacity-50 uppercase mb-1 block">Peg Count</label>
                        <input type="number" id="pegTotal" value="288" class="w-full p-3 border rounded-xl bg-slate-500/5 font-bold">
                    </div>
                    <button onclick="start()" class="bg-blue-600 text-white px-10 py-3 rounded-xl font-bold hover:bg-blue-700 shadow-lg transition-all">Start</button>
                </div>
            </div>

            <div id="main" class="hidden space-y-6">
                <div class="flex justify-around items-center bg-slate-500/5 p-6 rounded-2xl border border-slate-500/10">
                    <div class="text-center">
                        <span class="text-[10px] uppercase font-bold opacity-40">From</span>
                        <div id="dispFrom" class="text-5xl font-black tracking-tighter">-</div>
                    </div>
                    <div class="text-blue-500 animate-pulse text-3xl">→</div>
                    <div class="text-center">
                        <span class="text-[10px] uppercase font-bold opacity-40">To</span>
                        <div id="dispTo" class="text-5xl font-black text-red-500 tracking-tighter">-</div>
                    </div>
                </div>

                <svg id="canvas" viewBox="0 0 500 500" class="w-full h-auto">
                    <circle cx="250" cy="250" r="180" class="circle-bg" />
                    <g id="g-hist"></g>
                    <g id="g-pegs"></g>
                    <g id="g-curr"></g>
                </svg>

                <div class="grid grid-cols-2 gap-4">
                    <button onclick="step(-1)" class="p-5 bg-slate-200 dark:bg-slate-700 rounded-2xl font-bold active:scale-95 transition">Back</button>
                    <button onclick="step(1)" class="p-5 bg-red-500 text-white rounded-2xl font-bold text-xl shadow-lg active:scale-95 transition">Next</button>
                </div>

                <div class="text-center pt-6 border-t border-slate-500/10">
                    <p id="stepInfo" class="text-sm font-bold opacity-40 mb-4 tracking-wide">Step 0 of 0</p>
                    <div class="flex justify-center items-center gap-2">
                        <input type="number" id="jumpNum" class="border p-2 w-20 text-center rounded-xl bg-slate-500/5 font-bold">
                        <button onclick="jump()" class="text-blue-500 font-bold hover:text-blue-600 px-2">Jump</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let s = { seq: [], idx: 0, total: 288, dark: false };
        const C = 250, R = 180, L_R = 212; // Slightly more room for labels

        function save() { localStorage.setItem('stringArt_v9', JSON.stringify(s)); }
        function toggleDark() { s.dark = !s.dark; document.body.classList.toggle('dark-mode', s.dark); save(); draw(); }
        function resetAll() { if(confirm("Clear project?")) { localStorage.clear(); location.reload(); } }

        window.onload = () => {
            const saved = localStorage.getItem('stringArt_v9');
            if(saved) {
                s = JSON.parse(saved);
                if(s.dark) document.body.classList.add('dark-mode');
                if(s.seq.length) { document.getElementById('setup').classList.add('hidden'); document.getElementById('main').classList.remove('hidden'); setupBoard(); draw(); }
            }
        };

        function start() {
            const raw = document.getElementById('seqIn').value.match(/\d+/g);
            if(!raw) return alert("Paste numbers!");
            s.seq = raw.map(Number);
            s.total = parseInt(document.getElementById('pegTotal').value) || 288;
            s.idx = 0;
            document.getElementById('setup').classList.add('hidden');
            document.getElementById('main').classList.remove('hidden');
            setupBoard(); save(); draw();
        }

        function getXY(p, r) {
            const a = (p / s.total) * 2 * Math.PI;
            return { x: C + r * Math.cos(a), y: C + r * Math.sin(a), angle: a };
        }

        function setupBoard() {
            const g = document.getElementById('g-pegs'); g.innerHTML = '';
            const fontSize = s.total > 200 ? 6.5 : 8.5;

            for(let i=0; i<s.total; i++) {
                const p = getXY(i, R), lp = getXY(i, L_R);
                const dot = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                dot.setAttribute("cx", p.x); dot.setAttribute("cy", p.y); dot.setAttribute("r", 1.2); dot.classList.add('peg-dot');
                
                const txt = document.createElementNS("http://www.w3.org/2000/svg", "text");
                txt.setAttribute("x", lp.x); txt.setAttribute("y", lp.y);
                txt.setAttribute("text-anchor", "middle");
                txt.setAttribute("dominant-baseline", "middle");
                txt.setAttribute("font-size", fontSize);
                txt.id = `lbl-${i}`; txt.classList.add('p-lbl');
                
                // NEW: Intelligent Rotation
                let angleDeg = (lp.angle * 180 / Math.PI);
                
                // If the number is on the left side (90 to 270 degrees), 
                // flip it 180 degrees so it's always readable left-to-right.
                if (angleDeg > 90 && angleDeg < 270) {
                    angleDeg += 180;
                }
                
                txt.setAttribute("transform", `rotate(${angleDeg}, ${lp.x}, ${lp.y})`);
                txt.textContent = i;
                g.appendChild(dot); g.appendChild(txt);
            }
        }

        function draw() {
            const hG = document.getElementById('g-hist'); hG.innerHTML = '';
            const cG = document.getElementById('g-curr'); cG.innerHTML = '';
            document.querySelectorAll('.p-lbl').forEach(l => l.classList.remove('active'));

            for(let i=0; i<s.idx; i++) {
                const p1 = getXY(s.seq[i], R), p2 = getXY(s.seq[i+1], R);
                if(!p2) break;
                const l = document.createElementNS("http://www.w3.org/2000/svg", "line");
                l.setAttribute("x1", p1.x); l.setAttribute("y1", p1.y); l.setAttribute("x2", p2.x); l.setAttribute("y2", p2.y);
                l.classList.add('h-line'); hG.appendChild(l);
            }

            const f = s.seq[s.idx], t = s.seq[s.idx+1];
            document.getElementById('dispFrom').innerText = f;
            document.getElementById('dispTo').innerText = (t !== undefined) ? t : "END";
            document.getElementById('stepInfo').innerText = `STEP ${s.idx + 1} OF ${s.seq.length - 1}`;

            if(t !== undefined) {
                const p1 = getXY(f, R), p2 = getXY(t, R);
                const l = document.createElementNS("http://www.w3.org/2000/svg", "line");
                l.setAttribute("x1", p1.x); l.setAttribute("y1", p1.y); l.setAttribute("x2", p2.x); l.setAttribute("y2", p2.y);
                l.classList.add('c-line'); cG.appendChild(l);
                [f, t].forEach(v => {
                    const pos = getXY(v, R);
                    const c = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                    c.setAttribute("cx", pos.x); c.setAttribute("cy", pos.y); c.setAttribute("r", 5); c.classList.add('peg-active');
                    cG.appendChild(c);
                    document.getElementById(`lbl-${v}`)?.classList.add('active');
                });
            }
        }

        function step(dir) {
            if(dir === 1 && s.idx < s.seq.length - 2) s.idx++;
            else if(dir === -1 && s.idx > 0) s.idx--;
            save(); draw();
        }

        function jump() {
            const j = parseInt(document.getElementById('jumpNum').value) - 1;
            if(j >= 0 && j < s.seq.length - 1) { s.idx = j; save(); draw(); }
        }
    </script>
</body>
</html>
